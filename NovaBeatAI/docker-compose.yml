version: '3.9'
services:
  db:
    image: postgres:15
    container_name: novabeatai-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novabeatai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-novabeatai}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  fastapi:
    build: ./fastapi
    container_name: novabeatai-fastapi
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: novabeatai-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/novabeatai}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt}
      FASTAPI_URL: ${FASTAPI_URL:-http://fastapi:8000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      fastapi:
        condition: service_healthy

volumes:
  pgdata:
