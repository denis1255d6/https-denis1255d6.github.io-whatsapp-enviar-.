name: CI

on:
  push:
    paths:
      - 'NovaBeatAI/**'
  pull_request:
    paths:
      - 'NovaBeatAI/**'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NovaBeatAI/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: NovaBeatAI/backend/package.json
      - run: npm install
      - run: npm test

  fastapi-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NovaBeatAI/fastapi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: NovaBeatAI/fastapi/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q
