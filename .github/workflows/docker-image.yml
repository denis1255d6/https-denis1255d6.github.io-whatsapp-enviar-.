name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FASTAPI: ${{ github.repository }}/fastapi

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: novabeatai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'NovaBeatAI/backend/package.json'

    - name: Install backend dependencies
      working-directory: NovaBeatAI/backend
      run: npm ci

    - name: Run backend tests
      working-directory: NovaBeatAI/backend
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/novabeatai_test
        JWT_SECRET: test-secret-key-for-testing-only
        NODE_ENV: test
      run: npm test

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'NovaBeatAI/fastapi/requirements.txt'

    - name: Install FastAPI dependencies
      working-directory: NovaBeatAI/fastapi
      run: pip install -r requirements.txt

    - name: Run FastAPI tests
      working-directory: NovaBeatAI/fastapi
      run: pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (backend)
      id: meta_backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Extract metadata (fastapi)
      id: meta_fastapi
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FASTAPI }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./NovaBeatAI/backend
        file: ./NovaBeatAI/backend/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta_backend.outputs.tags }}
        labels: ${{ steps.meta_backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push fastapi
      uses: docker/build-push-action@v5
      with:
        context: ./NovaBeatAI/fastapi
        file: ./NovaBeatAI/fastapi/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta_fastapi.outputs.tags }}
        labels: ${{ steps.meta_fastapi.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
